<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Daftar | walimatul.web.id</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🕌</text></svg>" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css" />

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        gold: '#c9a96e',
                        'gold-hover': '#b8975a',
                        'green-dark': '#0f2b26',
                        'green-mid': '#1a4038',
                        cream: '#faf8f5',
                        'cream-dark': '#ede8dd',
                        'text-soft': '#4a5a57',
                    },
                    fontFamily: {
                        playfair: ['"Playfair Display"', 'serif'],
                    },
                }
            }
        }
    </script>
    <style>
        .border-gold {
            border-color: rgba(201, 169, 110, 0.3);
        }
        .shadow-gold {
            box-shadow: 0 8px 30px rgba(201, 169, 110, 0.15);
        }
        .bg-pattern {
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23c9a96e' fill-opacity='0.05'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
        }
        input:focus, select:focus {
            outline: none;
            border-color: #c9a96e;
            box-shadow: 0 0 0 3px rgba(201, 169, 110, 0.2);
        }
        .package-option {
            cursor: pointer;
            transition: all 0.2s;
        }
        .package-option:hover {
            border-color: #c9a96e;
        }
        .package-option.selected {
            border-color: #c9a96e;
            background: rgba(201, 169, 110, 0.08);
            box-shadow: 0 0 0 2px rgba(201, 169, 110, 0.2);
        }
    </style>
</head>
<body class="font-inter antialiased bg-cream text-green-dark min-h-screen flex flex-col">

    <!-- Header -->
    <header class="bg-white/90 backdrop-blur-sm border-b border-gold/30 py-3">
        <div class="max-w-6xl mx-auto px-4 sm:px-6 flex items-center justify-between">
            <a href="/" class="flex items-center gap-2">
                <span class="flex items-center justify-center h-9 w-9 rounded-full bg-green-dark text-gold font-playfair font-bold text-lg">W</span>
                <span class="font-playfair text-xl font-bold text-green-dark">walimatul<span class="text-gold">.web.id</span></span>
            </a>
            <a href="/login" class="text-sm font-medium text-text-soft hover:text-gold transition">Sudah punya akun? <span class="text-gold font-semibold">Masuk</span></a>
        </div>
    </header>

    <!-- Main -->
    <main class="flex-1 flex items-center justify-center px-4 py-12 bg-pattern">
        <div class="w-full max-w-md">
            <div class="bg-white rounded-2xl border border-gold/40 shadow-gold p-8">
                <div class="text-center mb-8">
                    <h1 class="font-playfair text-2xl font-bold text-green-dark">Daftar Gratis</h1>
                    <p class="text-sm text-text-soft mt-1">Mulai buat undangan digital elegan</p>
                </div>

                <form class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-green-dark mb-1.5">Nama Lengkap</label>
                        <input type="text" placeholder="Andi Pratama" class="w-full px-4 py-2.5 rounded-lg border border-gold/40 bg-cream/50 text-sm transition" />
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-green-dark mb-1.5">Email</label>
                        <input type="email" placeholder="nama@email.com" class="w-full px-4 py-2.5 rounded-lg border border-gold/40 bg-cream/50 text-sm transition" />
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-green-dark mb-1.5">Kata Sandi</label>
                        <input type="password" placeholder="Minimal 8 karakter" class="w-full px-4 py-2.5 rounded-lg border border-gold/40 bg-cream/50 text-sm transition" />
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-green-dark mb-1.5">Konfirmasi Sandi</label>
                        <input type="password" placeholder="••••••••" class="w-full px-4 py-2.5 rounded-lg border border-gold/40 bg-cream/50 text-sm transition" />
                    </div>

                    <!-- Package Selection -->
                    <div>
                        <label class="block text-sm font-medium text-green-dark mb-2">Pilih Paket</label>
                        <div class="grid grid-cols-3 gap-2">
                            <div class="package-option selected border-2 border-gold rounded-lg p-2.5 text-center text-xs">
                                <div class="font-bold text-green-dark">Gratis</div>
                                <div class="text-text-soft">2 Hari</div>
                                <div class="text-gold font-bold">Rp 0</div>
                            </div>
                            <div class="package-option border-2 border-gold/30 rounded-lg p-2.5 text-center text-xs hover:border-gold/60">
                                <div class="font-bold text-green-dark">Platinum</div>
                                <div class="text-text-soft">90 Hari</div>
                                <div class="text-gold font-bold">Rp 90K</div>
                            </div>
                            <div class="package-option border-2 border-gold/30 rounded-lg p-2.5 text-center text-xs hover:border-gold/60">
                                <div class="font-bold text-green-dark">Unlimited</div>
                                <div class="text-text-soft">Selamanya</div>
                                <div class="text-gold font-bold">Rp 200K</div>
                            </div>
                        </div>
                    </div>

                    <button type="submit" class="w-full py-2.5 bg-gold text-white font-semibold rounded-lg hover:bg-gold-hover transition shadow-md">Coba Gratis</button>
                </form>

                <div class="mt-6 text-center text-sm text-text-soft">
                    Dengan mendaftar, Anda menyetujui <a href="#" class="text-gold hover:underline">Syarat &amp; Ketentuan</a>
                </div>

                <div class="mt-4 text-center text-sm text-text-soft">
                    Sudah punya akun? <a href="/login" class="text-gold font-semibold hover:underline">Masuk</a>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-green-dark text-white/70 py-4 border-t border-gold/50 text-center text-sm">
        <span>&copy; 2025 walimatul.web.id</span>
    </footer>

    <script>
        // Package selection toggle
        document.querySelectorAll('.package-option').forEach(el => {
            el.addEventListener('click', function() {
                document.querySelectorAll('.package-option').forEach(p => {
                    p.classList.remove('selected');
                    p.classList.add('border-gold/30');
                    p.classList.remove('border-gold');
                });
                this.classList.add('selected');
                this.classList.remove('border-gold/30');
                this.classList.add('border-gold');
            });
        });
    </script>
</body>
</html>
