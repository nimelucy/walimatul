<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Buat Undangan | walimatul.web.id</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🕌</text></svg>" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css" />

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        gold: '#c9a96e',
                        'gold-hover': '#b8975a',
                        'green-dark': '#0f2b26',
                        'green-mid': '#1a4038',
                        cream: '#faf8f5',
                        'cream-dark': '#ede8dd',
                        'text-soft': '#4a5a57',
                    },
                    fontFamily: {
                        playfair: ['"Playfair Display"', 'serif'],
                    },
                }
            }
        }
    </script>
    <style>
        .border-gold {
            border-color: rgba(201, 169, 110, 0.3);
        }
        .shadow-gold {
            box-shadow: 0 8px 30px rgba(201, 169, 110, 0.15);
        }
        .bg-pattern {
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23c9a96e' fill-opacity='0.05'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #c9a96e;
            box-shadow: 0 0 0 3px rgba(201, 169, 110, 0.2);
        }
        .step-indicator {
            transition: all 0.3s;
        }
        .step-indicator.active {
            background: #c9a96e;
            color: white;
            border-color: #c9a96e;
        }
        .step-indicator.done {
            background: #0f2b26;
            color: white;
            border-color: #0f2b26;
        }
    </style>
</head>
<body class="font-inter antialiased bg-cream text-green-dark min-h-screen flex flex-col">

    <!-- Header -->
    <header class="bg-white/90 backdrop-blur-sm border-b border-gold/30 py-3">
        <div class="max-w-6xl mx-auto px-4 sm:px-6 flex items-center justify-between">
            <a href="/" class="flex items-center gap-2">
                <span class="flex items-center justify-center h-9 w-9 rounded-full bg-green-dark text-gold font-playfair font-bold text-lg">W</span>
                <span class="font-playfair text-xl font-bold text-green-dark">walimatul<span class="text-gold">.web.id</span></span>
            </a>
            <div class="flex items-center gap-3">
                <span class="text-sm text-text-soft hidden sm:inline">Andi Pratama</span>
                <a href="/logout" class="text-sm text-text-soft hover:text-gold transition">Keluar</a>
            </div>
        </div>
    </header>

    <!-- Main -->
    <main class="flex-1 px-4 py-8 bg-pattern">
        <div class="max-w-3xl mx-auto">
            <!-- Step Indicator -->
            <div class="flex items-center justify-between mb-8 max-w-sm mx-auto">
                <div class="flex items-center gap-2">
                    <span class="step-indicator active w-8 h-8 rounded-full border-2 border-gold flex items-center justify-center text-sm font-bold">1</span>
                    <span class="text-xs font-medium text-green-dark">Detail</span>
                </div>
                <div class="w-12 h-0.5 bg-gold/30"></div>
                <div class="flex items-center gap-2">
                    <span class="step-indicator w-8 h-8 rounded-full border-2 border-gold/30 flex items-center justify-center text-sm font-bold text-text-soft">2</span>
                    <span class="text-xs font-medium text-text-soft">Tema</span>
                </div>
                <div class="w-12 h-0.5 bg-gold/30"></div>
                <div class="flex items-center gap-2">
                    <span class="step-indicator w-8 h-8 rounded-full border-2 border-gold/30 flex items-center justify-center text-sm font-bold text-text-soft">3</span>
                    <span class="text-xs font-medium text-text-soft">Preview</span>
                </div>
            </div>

            <!-- Form Card -->
            <div class="bg-white rounded-2xl border border-gold/40 shadow-gold p-6 sm:p-8">
                <h2 class="font-playfair text-xl font-bold text-green-dark mb-6">Detail Undangan</h2>

                <form class="space-y-5">
                    <!-- Nama Acara -->
                    <div>
                        <label class="block text-sm font-medium text-green-dark mb-1.5">Nama Acara</label>
                        <input type="text" placeholder="Contoh: Pernikahan Andi &amp; Rina" class="w-full px-4 py-2.5 rounded-lg border border-gold/40 bg-cream/50 text-sm transition" />
                    </div>

                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-green-dark mb-1.5">Nama Mempelai Pria</label>
                            <input type="text" placeholder="Andi" class="w-full px-4 py-2.5 rounded-lg border border-gold/40 bg-cream/50 text-sm transition" />
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-green-dark mb-1.5">Nama Mempelai Wanita</label>
                            <input type="text" placeholder="Rina" class="w-full px-4 py-2.5 rounded-lg border border-gold/40 bg-cream/50 text-sm transition" />
                        </div>
                    </div>

                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-green-dark mb-1.5">Tanggal Acara</label>
                            <input type="date" class="w-full px-4 py-2.5 rounded-lg border border-gold/40 bg-cream/50 text-sm transition" />
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-green-dark mb-1.5">Waktu</label>
                            <input type="time" value="10:00" class="w-full px-4 py-2.5 rounded-lg border border-gold/40 bg-cream/50 text-sm transition" />
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-green-dark mb-1.5">Lokasi Acara</label>
                        <input type="text" placeholder="Aula Grand Purwokerto" class="w-full px-4 py-2.5 rounded-lg border border-gold/40 bg-cream/50 text-sm transition" />
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-green-dark mb-1.5">Alamat Lengkap</label>
                        <textarea rows="2" placeholder="Jl. Jendral Sudirman No. 123, Purwokerto" class="w-full px-4 py-2.5 rounded-lg border border-gold/40 bg-cream/50 text-sm transition resize-none"></textarea>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-green-dark mb-1.5">Link Google Maps (opsional)</label>
                        <input type="url" placeholder="https://maps.google.com/..." class="w-full px-4 py-2.5 rounded-lg border border-gold/40 bg-cream/50 text-sm transition" />
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-green-dark mb-1.5">Deskripsi Singkat</label>
                        <textarea rows="2" placeholder="Cerita singkat tentang acara..." class="w-full px-4 py-2.5 rounded-lg border border-gold/40 bg-cream/50 text-sm transition resize-none"></textarea>
                    </div>

                    <button type="submit" class="w-full py-2.5 bg-gold text-white font-semibold rounded-lg hover:bg-gold-hover transition shadow-md">
                        Lanjut Pilih Tema <i class="fas fa-arrow-right ml-2"></i>
                    </button>
                </form>
            </div>

            <!-- Tip -->
            <div class="mt-6 text-center text-sm text-text-soft">
                <i class="fas fa-lightbulb text-gold mr-2"></i>
                Tips: Isi semua data dengan lengkap untuk hasil undangan yang maksimal.
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-green-dark text-white/70 py-4 border-t border-gold/50 text-center text-sm">
        <span>&copy; 2025 walimatul.web.id</span>
    </footer>

    <script>
        // Simple step indicator (just visual, no actual navigation)
        document.querySelectorAll('.step-indicator').forEach((el, i) => {
            if (i === 0) {
                el.classList.add('active');
            } else {
                el.classList.add('done');
                el.textContent = '✓';
            }
        });
    </script>
</body>
</html>
